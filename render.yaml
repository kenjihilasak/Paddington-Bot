services:
  - name: luke-bot-web
    type: web
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: bash -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        fromDatabase:
          name: luke-bot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: luke-bot-redis
          property: connectionString
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: USE_FAKE_REDIS
        value: "false"
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: WEBHOOK_LOG_PAYLOADS
        value: "true"
      - key: META_VERIFY_TOKEN
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_PHONE_NUMBER_ID
        sync: false
      - key: META_GRAPH_VERSION
        value: v25.0
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.openai.com/v1
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: INTENT_CLASSIFIER_ENABLED
        value: "false"
      - key: INTENT_CLASSIFIER_BASE_URL
        value: ""
      - key: INTENT_CLASSIFIER_API_KEY
        sync: false
      - key: INTENT_CLASSIFIER_MODEL
        value: intfloat/multilingual-e5-small

  - name: luke-bot-redis
    type: keyvalue
    plan: starter
    region: frankfurt
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: luke-bot-db
    plan: starter
    region: frankfurt
    postgresMajorVersion: "16"
